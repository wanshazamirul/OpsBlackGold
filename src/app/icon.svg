<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#1a1a1a"/>

  <!-- Warning triangle -->
  <polygon points="50,15 85,80 15,80" fill="#ef4444" stroke="#fbbf24" stroke-width="3"/>

  <!-- Exclamation mark -->
  <rect x="46" y="30" width="8" height="30" fill="white" rx="2"/>
  <circle cx="50" cy="70" r="5" fill="white"/>

  <!-- Glow effect -->
  <polygon points="50,15 85,80 15,80" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.5"/>
</svg>
